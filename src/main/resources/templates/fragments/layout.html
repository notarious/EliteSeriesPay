<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" th:fragment="layout (pageTitle, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:replace="${pageTitle}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="d-flex flex-column min-vh-100">
<nav class="navbar navbar-expand-lg navbar-dark navbar-app">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Проекты от Ave Elite</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"
                aria-controls="mainNavbar" aria-expanded="false" aria-label="Открыть меню">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto align-items-lg-center">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}"
                       th:classappend="${navigation.homeActive()} ? 'active'">Главная</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/projects}"
                       th:classappend="${navigation.projectsActive()} ? 'active'">Проекты</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/participants}"
                       th:classappend="${navigation.participantsActive()} ? 'active'">Участники</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/backups}"
                       th:classappend="${navigation.backupsActive()} ? 'active'">Резервные копии</a>
                </li>
                <li class="nav-item">
                    <button class="nav-link btn btn-nav-action border-0 bg-transparent" type="button"
                            data-bs-toggle="modal" data-bs-target="#resetDataModal">Очистить данные</button>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container flex-grow-1 py-4">
    <div th:replace="${content}"></div>
</main>

<footer class="app-footer py-3 mt-auto">
    <div class="container small">
        Проекты от Ave Elite &mdash; локальное приложение для учёта проектов, участников, платежей и бюджетов
    </div>
</footer>

<div class="modal fade" id="resetDataModal" tabindex="-1" aria-labelledby="resetDataModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="resetDataModalLabel">Очистить все данные?</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
            </div>
            <div class="modal-body">
                <p class="mb-0">
                    Будут удалены все проекты, участники, платежи и настройки.
                    Это действие нельзя отменить.
                </p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <form method="post" th:action="@{/reset-data}" class="d-inline">
                    <button type="submit" class="btn btn-danger">Очистить</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
        crossorigin="anonymous"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(function (element) {
            new bootstrap.Tooltip(element);
        });
    });
</script>
</body>
</html>
