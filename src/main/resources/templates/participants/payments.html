<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::content})}">
<head>
    <title th:text="'История платежей — ' + ${participant.name} + ' — Проекты от Ave Elite'">
    </title>
</head>
<body>
<div th:fragment="content">
    <div class="page-header d-flex justify-content-between align-items-start">
        <div>
            <h1 class="h3 mb-1">История платежей</h1>
            <p class="page-subtitle">
                Участник:
                <a th:href="@{/participants/{id}(id=${participant.id})}" th:text="${participant.name}"></a>
            </p>
        </div>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-secondary btn-sm"
               th:href="@{/participants/{id}(id=${participant.id})}">К участнику</a>
            <a th:if="${!#lists.isEmpty(activeMemberships)}" class="btn btn-success btn-sm"
               th:href="@{/participants/{id}/payments/new(id=${participant.id}, returnTo=${historyNavigation.listUrl()})}">Добавить платёж</a>
        </div>
    </div>

    <form class="filter-panel row g-2 align-items-end" method="get"
          th:action="@{/participants/{participantId}/payments(participantId=${participant.id})}">
        <div class="col-md-3 col-lg-2">
            <label class="form-label small mb-1" for="projectId">Проект</label>
            <select class="form-select form-select-sm" id="projectId" name="projectId">
                <option value="" th:selected="${historyFilter.projectId == null}">Все проекты</option>
                <option th:each="project : ${filterProjects}"
                        th:selected="${historyFilter.projectId != null and historyFilter.projectId == project.id}"
                        th:text="${project.name}"
                        th:value="${project.id}">...</option>
            </select>
        </div>
        <div class="col-md-3 col-lg-2">
            <label class="form-label small mb-1" for="source">Источник</label>
            <select class="form-select form-select-sm" id="source" name="source">
                <option value="" th:selected="${historyFilter.source == null}">Все</option>
                <option th:each="paymentSource : ${T(com.eliteseriespay.domain.PaymentSource).values()}"
                        th:value="${paymentSource.name()}"
                        th:selected="${historyFilter.source == paymentSource}"
                        th:text="${paymentSource.displayName}"></option>
            </select>
        </div>
        <div class="col-md-3 col-lg-2">
            <label class="form-label small mb-1" for="status">Статус</label>
            <select class="form-select form-select-sm" id="status" name="status">
                <option value="" th:selected="${historyFilter.status == null}">Все</option>
                <option value="ACTIVE"
                        th:selected="${historyFilter.status != null and historyFilter.status.name() == 'ACTIVE'}">
                    Активные
                </option>
                <option value="VOIDED"
                        th:selected="${historyFilter.status != null and historyFilter.status.name() == 'VOIDED'}">
                    Аннулированные
                </option>
            </select>
        </div>
        <div class="col-md-4 col-lg-3">
            <label class="form-label small mb-1">Период</label>
            <div class="input-group input-group-sm">
                <input class="form-control" id="dateFrom" name="dateFrom" type="date"
                       aria-label="С" th:value="${historyFilter.dateFrom}">
                <span class="input-group-text px-2">—</span>
                <input class="form-control" id="dateTo" name="dateTo" type="date"
                       aria-label="По" th:value="${historyFilter.dateTo}">
            </div>
        </div>
        <div class="col-auto">
            <button class="btn btn-primary btn-sm" type="submit">Применить</button>
        </div>
        <div class="col-auto">
            <label class="form-label small mb-1" for="pageSize">На странице</label>
            <select class="form-select form-select-sm" id="pageSize" name="size" onchange="this.form.submit()">
                <option th:each="allowedSize : ${allowedPageSizes}"
                        th:selected="${allowedSize == historyFilter.pageSize}"
                        th:text="${allowedSize}"
                        th:value="${allowedSize}">...</option>
            </select>
        </div>
        <input name="page" type="hidden" value="0">
    </form>

    <div th:if="${!hasAnyPayments}" class="empty-state" role="status">
        <i class="bi bi-cash-coin empty-state-icon" aria-hidden="true"></i>
        <p>Платежей пока нет.</p>
    </div>

    <div th:if="${hasAnyPayments and paymentsPage.totalElements == 0}" class="empty-state" role="status">
        <i class="bi bi-funnel empty-state-icon" aria-hidden="true"></i>
        <p>Ничего не найдено. Попробуйте изменить фильтры.</p>
    </div>

    <div th:if="${paymentsPage.totalElements > 0}">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="text-muted small"
                 th:text="|Найдено: ${paymentsPage.totalElements}|"></div>
            <div class="text-muted small"
                 th:if="${paymentsPage.totalPages > 1}"
                 th:text="|Страница ${paymentsPage.number + 1} из ${paymentsPage.totalPages}|">
            </div>
        </div>

        <div class="table-responsive app-table app-table-payment-history">
            <table class="table table-hover align-middle mb-0">
                <thead>
                <tr>
                    <th scope="col">Дата</th>
                    <th scope="col">Проект</th>
                    <th scope="col">Источник</th>
                    <th scope="col" class="payment-history-status-col">Статус</th>
                    <th scope="col" class="text-end">В валюте</th>
                    <th scope="col" class="text-end">Курс</th>
                    <th scope="col" class="text-end">Сумма</th>
                    <th scope="col" class="text-end">Комиссия</th>
                    <th scope="col" class="text-end">Получено</th>
                    <th scope="col" class="payment-history-comment-col">Комментарий</th>
                    <th scope="col" class="text-end payment-history-actions-col">Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="payment : ${paymentsPage.content}"
                    th:classappend="${payment.status.name() == 'VOIDED'} ? 'text-muted' : ''">
                    <td th:text="${#temporals.format(payment.paymentDate, 'dd.MM.yyyy')}"></td>
                    <td>
                        <a th:href="@{/projects/{id}(id=${payment.project.id})}"
                           th:text="${payment.project.name}"></a>
                    </td>
                    <td th:text="${payment.source.displayName}"></td>
                    <td class="payment-history-status">
                        <th:block th:replace="~{fragments/payment-status-badge :: badge(${payment.status})}"></th:block>
                    </td>
                    <td class="text-end">
                        <span th:text="${#numbers.formatDecimal(payment.amountOriginal, 1, 'COMMA', 2, 'POINT')}"></span>
                        <span th:text="' ' + ${payment.currency.displayName}"></span>
                    </td>
                    <td class="text-end"
                        th:text="${#numbers.formatDecimal(payment.exchangeRate, 1, 'COMMA', 4, 'POINT')}"></td>
                    <td class="text-end"
                        th:text="${#numbers.formatDecimal(payment.amountRub, 1, 'COMMA', 2, 'POINT')} + ' ₽'"></td>
                    <td class="text-end" th:text="${payment.feePercent} + '%'"></td>
                    <td class="text-end"
                        th:text="${#numbers.formatDecimal(payment.netAmountRub, 1, 'COMMA', 2, 'POINT')} + ' ₽'"></td>
                    <td class="payment-history-comment"
                        th:text="${payment.comment != null ? payment.comment : '—'}"></td>
                    <td class="text-end payment-history-actions">
                        <div th:if="${payment.status.name() == 'ACTIVE'}" class="d-inline-flex gap-1 align-items-center">
                            <a class="btn btn-sm btn-outline-primary"
                               th:href="${historyNavigation.editUrl(payment.id)}"
                               data-bs-toggle="tooltip" data-bs-title="Изменить"
                               aria-label="Изменить">
                                <i class="bi bi-pencil" aria-hidden="true"></i>
                            </a>
                            <form th:action="@{/participants/{participantId}/payments/{paymentId}/void(
                                    participantId=${participant.id}, paymentId=${payment.id})}"
                                  method="post" class="d-inline">
                                <th:block th:each="historyParam : ${historyNavigation.formParams()}">
                                    <input type="hidden" th:name="${historyParam.name}" th:value="${historyParam.value}">
                                </th:block>
                                <button type="submit" class="btn btn-sm btn-outline-danger"
                                        data-bs-toggle="tooltip" data-bs-title="Аннулировать"
                                        aria-label="Аннулировать"
                                        onclick="return confirm('Аннулировать платёж? Платёж останется в истории, но не будет учитываться в расчётах.');">
                                    <i class="bi bi-x-circle" aria-hidden="true"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <nav class="mt-3" th:if="${paymentsPage.totalPages > 1}" aria-label="Навигация по страницам">
            <ul class="pagination pagination-sm justify-content-center mb-0">
                <li class="page-item" th:classappend="${paymentsPage.first} ? 'disabled'">
                    <a class="page-link"
                       th:href="${historyNavigation.listUrl(paymentsPage.number - 1)}"
                       th:unless="${paymentsPage.first}">Назад</a>
                    <span class="page-link" th:if="${paymentsPage.first}">Назад</span>
                </li>

                <li class="page-item"
                    th:each="pageNumber : ${#numbers.sequence(0, paymentsPage.totalPages - 1)}"
                    th:classappend="${pageNumber == paymentsPage.number} ? 'active'">
                    <a class="page-link"
                       th:href="${historyNavigation.listUrl(pageNumber)}"
                       th:text="${pageNumber + 1}"
                       th:unless="${pageNumber == paymentsPage.number}"></a>
                    <span class="page-link" th:if="${pageNumber == paymentsPage.number}"
                          th:text="${pageNumber + 1}"></span>
                </li>

                <li class="page-item" th:classappend="${paymentsPage.last} ? 'disabled'">
                    <a class="page-link"
                       th:href="${historyNavigation.listUrl(paymentsPage.number + 1)}"
                       th:unless="${paymentsPage.last}">Вперёд</a>
                    <span class="page-link" th:if="${paymentsPage.last}">Вперёд</span>
                </li>
            </ul>
        </nav>
    </div>
</div>
</body>
</html>
