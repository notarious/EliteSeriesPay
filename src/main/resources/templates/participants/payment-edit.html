<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::content})}">
<head>
    <title>Изменение платежа — Проекты от Ave Elite</title>
</head>
<body>
<div th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="d-flex justify-content-between align-items-start mb-3">
                <div>
                    <h1 class="h3 mb-1">Изменение платежа</h1>
                    <p class="text-muted small mb-0">
                        Участник: <span th:text="${participant.name}">Иван</span>
                    </p>
                </div>
                <a th:if="${projectHistoryNavigation != null}" class="btn btn-outline-secondary btn-sm"
                   th:href="${projectHistoryNavigation.listUrl()}">Отмена</a>
                <a th:unless="${projectHistoryNavigation != null}" class="btn btn-outline-secondary btn-sm"
                   th:href="${historyNavigation.listUrl()}">Отмена</a>
            </div>

            <form th:action="@{/participants/{participantId}/payments/{paymentId}/edit(participantId=${participantId}, paymentId=${paymentId})}"
                  th:object="${paymentForm}" method="post" novalidate>
                <div class="mb-3">
                    <label for="projectId" class="form-label">Проект</label>
                    <select class="form-select" id="projectId" th:field="*{projectId}"
                            th:classappend="${#fields.hasErrors('projectId')} ? 'is-invalid'">
                        <option value="">Выберите проект</option>
                        <option th:each="membership : ${activeMemberships}"
                                th:value="${membership.project.id}"
                                th:text="${membership.project.name}">Пример проекта</option>
                    </select>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('projectId')}"
                         th:errors="*{projectId}"></div>
                </div>

                <th:block th:replace="~{fragments/payment-form-fields :: fields}"/>

                <th:block th:if="${projectHistoryNavigation != null}">
                    <th:block th:each="historyParam : ${projectHistoryNavigation.formParams()}">
                        <input type="hidden" th:name="${historyParam.name}" th:value="${historyParam.value}">
                    </th:block>
                </th:block>
                <th:block th:if="${projectHistoryNavigation == null}">
                    <th:block th:each="historyParam : ${historyNavigation.formParams()}">
                        <input type="hidden" th:name="${historyParam.name}" th:value="${historyParam.value}">
                    </th:block>
                </th:block>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Сохранить изменения</button>
                    <a th:if="${projectHistoryNavigation != null}" class="btn btn-outline-secondary"
                       th:href="${projectHistoryNavigation.listUrl()}">Отмена</a>
                    <a th:unless="${projectHistoryNavigation != null}" class="btn btn-outline-secondary"
                       th:href="${historyNavigation.listUrl()}">Отмена</a>
                </div>
            </form>
        </div>
    </div>

    <th:block th:replace="~{fragments/payment-form-fields :: exchangeRateScript}"/>
</div>
</body>
</html>
