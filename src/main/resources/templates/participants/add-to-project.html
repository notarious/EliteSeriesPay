<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::content})}">
<head>
    <title>Добавить в проект — Проекты от Ave Elite</title>
</head>
<body>
<div th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h1 class="h3 mb-0">Добавить в проект</h1>
                <a class="btn btn-outline-secondary btn-sm"
                   th:href="@{/participants/{id}(id=${participantId})}">К участнику</a>
            </div>

            <div th:if="${#lists.isEmpty(availableProjects)}" class="empty-state" role="status">
                <i class="bi bi-collection empty-state-icon" aria-hidden="true"></i>
                <p class="mb-3">Нет доступных проектов. Участник уже состоит во всех проектах или проектов пока нет.</p>
                <a class="btn btn-outline-secondary btn-sm"
                   th:href="@{/participants/{id}(id=${participantId})}">Назад</a>
            </div>

            <div class="form-card" th:unless="${#lists.isEmpty(availableProjects)}">
            <form th:action="@{/participants/{id}/projects(id=${participantId})}"
                  th:object="${addParticipantToProjectForm}" method="post" novalidate>
                <div class="mb-4">
                    <label for="projectId" class="form-label">Проект</label>
                    <select class="form-select" id="projectId" th:field="*{projectId}"
                            th:classappend="${#fields.hasErrors('projectId')} ? 'is-invalid'">
                        <option value="">Выберите проект</option>
                        <option th:each="project : ${availableProjects}"
                                th:value="${project.id}"
                                th:text="${project.name}">Пример проекта</option>
                    </select>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('projectId')}"
                         th:errors="*{projectId}"></div>
                </div>

                <div class="mb-3">
                    <label for="billingMode" class="form-label">Тип оплаты</label>
                    <select class="form-select" id="billingMode" th:field="*{billingMode}"
                            th:classappend="${#fields.hasErrors('billingMode')} ? 'is-invalid'">
                        <option th:each="mode : ${billingModes}"
                                th:value="${mode.name()}"
                                th:text="${mode.displayName}">Абонемент</option>
                    </select>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('billingMode')}"
                         th:errors="*{billingMode}"></div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Добавить</button>
                    <a class="btn btn-outline-secondary"
                       th:href="@{/participants/{id}(id=${participantId})}">Отмена</a>
                </div>
            </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
