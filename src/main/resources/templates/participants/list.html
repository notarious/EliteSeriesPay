<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::content})}">
<head>
    <title>Участники &mdash; EliteSeriesPay</title>
</head>
<body>
<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-0">Участники</h1>
        <a class="btn btn-primary" th:href="@{/participants/new}">Новый участник</a>
    </div>

    <div th:if="${#lists.isEmpty(participants)}" class="alert alert-info mb-0">
        Участников пока нет. Создайте первого участника.
    </div>

    <div th:unless="${#lists.isEmpty(participants)}" class="table-responsive">
        <table class="table table-striped align-middle">
            <thead>
            <tr>
                <th scope="col">Имя</th>
                <th scope="col">VK ID</th>
                <th scope="col">Комментарий</th>
                <th scope="col" class="text-end">Активных проектов</th>
                <th scope="col" class="text-end">Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="participant : ${participants}">
                <td>
                    <a th:href="@{/participants/{id}(id=${participant.id})}" th:text="${participant.name}">Иван</a>
                </td>
                <td th:text="${participant.vkId}">12345</td>
                <td th:text="${participant.comment != null ? participant.comment : '—'}">—</td>
                <td class="text-end"
                    th:text="${activeProjectCounts.containsKey(participant.id) ? activeProjectCounts.get(participant.id) : 0}">
                    0
                </td>
                <td class="text-end">
                    <a class="btn btn-sm btn-outline-primary"
                       th:href="@{/participants/{id}(id=${participant.id})}">Открыть</a>
                    <a class="btn btn-sm btn-outline-secondary"
                       th:href="@{/participants/{id}/edit(id=${participant.id})}">Изменить</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
