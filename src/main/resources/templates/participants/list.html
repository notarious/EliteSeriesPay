<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::content})}">
<head>
    <title>Участники &mdash; Проекты от Ave Elite</title>
</head>
<body>
<div th:fragment="content">
    <div class="page-header d-flex justify-content-between align-items-center">
        <h1 class="h3 mb-0">Участники</h1>
        <a class="btn btn-primary btn-sm" th:href="@{/participants/new}">Новый участник</a>
    </div>

    <form class="filter-panel row g-2 align-items-end" method="get" th:action="@{/participants}">
        <div class="col-md-4 col-lg-3">
            <label class="form-label small mb-1" for="searchQuery">Имя или VK ID</label>
            <input class="form-control form-control-sm" id="searchQuery" name="q" type="search"
                   th:value="${searchQuery}" placeholder="Имя или VK ID">
        </div>
        <div class="col-auto">
            <button class="btn btn-primary btn-sm" type="submit">Найти</button>
        </div>
        <div class="col-auto">
            <label class="form-label small mb-1" for="pageSize">На странице</label>
            <select class="form-select form-select-sm" id="pageSize" name="size" onchange="this.form.submit()">
                <option th:each="allowedSize : ${allowedPageSizes}"
                        th:selected="${allowedSize == pageSize}"
                        th:text="${allowedSize}"
                        th:value="${allowedSize}">...</option>
            </select>
        </div>
        <input name="page" type="hidden" value="0">
    </form>

    <div th:if="${participantsPage.totalElements == 0 and #strings.isEmpty(searchQuery)}"
         class="empty-state" role="status">
        <i class="bi bi-people empty-state-icon" aria-hidden="true"></i>
        <p>Участников пока нет. Создайте первого участника.</p>
    </div>

    <div th:if="${participantsPage.totalElements == 0 and !#strings.isEmpty(searchQuery)}"
         class="empty-state" role="status">
        <i class="bi bi-search empty-state-icon" aria-hidden="true"></i>
        <p>Ничего не найдено. Попробуйте изменить запрос.</p>
    </div>

    <div th:unless="${participantsPage.totalElements == 0}">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="text-muted small"
                 th:text="|Найдено: ${participantsPage.totalElements}|"></div>
            <div class="text-muted small"
                 th:if="${participantsPage.totalPages > 1}"
                 th:text="|Страница ${participantsPage.number + 1} из ${participantsPage.totalPages}|">
            </div>
        </div>

        <div class="table-responsive app-table">
            <table class="table table-hover align-middle mb-0">
                <thead>
                <tr>
                    <th scope="col">Имя</th>
                    <th scope="col">VK ID</th>
                    <th scope="col">Комментарий</th>
                    <th scope="col" class="text-end">Активных проектов</th>
                    <th scope="col" class="text-end">Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="participant : ${participantsPage.content}">
                    <td>
                        <a th:href="@{/participants/{id}(id=${participant.id})}"
                           th:text="${participant.name}"></a>
                    </td>
                    <td th:text="${participant.vkId}"></td>
                    <td th:text="${participant.comment != null ? participant.comment : '—'}"></td>
                    <td class="text-end"
                        th:text="${activeProjectCounts.containsKey(participant.id) ? activeProjectCounts.get(participant.id) : 0}">
                    </td>
                    <td class="text-end">
                        <div class="d-inline-flex gap-1">
                            <a class="btn btn-sm btn-outline-secondary"
                               th:href="@{/participants/{id}(id=${participant.id})}"
                               data-bs-toggle="tooltip" data-bs-title="Просмотр"
                               aria-label="Просмотр">
                                <i class="bi bi-eye" aria-hidden="true"></i>
                            </a>
                            <a class="btn btn-sm btn-outline-primary"
                               th:href="@{/participants/{id}/edit(id=${participant.id})}"
                               data-bs-toggle="tooltip" data-bs-title="Изменить"
                               aria-label="Изменить">
                                <i class="bi bi-pencil" aria-hidden="true"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <nav class="mt-3" th:if="${participantsPage.totalPages > 1}" aria-label="Навигация по страницам">
            <ul class="pagination pagination-sm justify-content-center mb-0">
                <li class="page-item" th:classappend="${participantsPage.first} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/participants(q=${searchQuery}, page=${participantsPage.number - 1}, size=${pageSize})}"
                       th:unless="${participantsPage.first}">Назад</a>
                    <span class="page-link" th:if="${participantsPage.first}">Назад</span>
                </li>

                <li class="page-item"
                    th:each="pageNumber : ${#numbers.sequence(0, participantsPage.totalPages - 1)}"
                    th:classappend="${pageNumber == participantsPage.number} ? 'active'">
                    <a class="page-link"
                       th:href="@{/participants(q=${searchQuery}, page=${pageNumber}, size=${pageSize})}"
                       th:text="${pageNumber + 1}"
                       th:unless="${pageNumber == participantsPage.number}"></a>
                    <span class="page-link" th:if="${pageNumber == participantsPage.number}"
                          th:text="${pageNumber + 1}"></span>
                </li>

                <li class="page-item" th:classappend="${participantsPage.last} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/participants(q=${searchQuery}, page=${participantsPage.number + 1}, size=${pageSize})}"
                       th:unless="${participantsPage.last}">Вперёд</a>
                    <span class="page-link" th:if="${participantsPage.last}">Вперёд</span>
                </li>
            </ul>
        </nav>
    </div>
</div>
</body>
</html>
