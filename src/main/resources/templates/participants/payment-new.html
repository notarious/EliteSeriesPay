<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::content})}">
<head>
    <title>Новый платёж — EliteSeriesPay</title>
</head>
<body>
<div th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <h1 class="mb-1" th:text="${initialMembership} ? 'Первый платёж абонемента' : 'Новый платёж'">Новый платёж</h1>
            <p class="text-muted mb-4">
                Участник: <span th:text="${participant.name}">Иван</span>
            </p>

            <div th:if="${initialMembership}" class="alert alert-info py-2">
                Для добавления участника в проект с абонементом необходим первый платёж.
                Проект:
                <strong th:text="${initialMembershipProject.name}">Пример проекта</strong>
            </div>

            <form th:action="@{/participants/{id}/payments(id=${participantId})}"
                  th:object="${paymentForm}" method="post" novalidate>
                <input type="hidden" name="initialMembership" th:value="${initialMembership}">
                <input type="hidden" name="returnTo" th:if="${returnTo != null}" th:value="${returnTo}">

                <div class="mb-3" th:if="${initialMembership}">
                    <label class="form-label">Проект</label>
                    <input type="hidden" th:field="*{projectId}">
                    <p class="form-control-plaintext mb-0" th:text="${initialMembershipProject.name}">Пример проекта</p>
                </div>

                <div class="mb-3" th:unless="${initialMembership}">
                    <label for="projectId" class="form-label">Проект</label>
                    <select class="form-select" id="projectId" th:field="*{projectId}"
                            th:classappend="${#fields.hasErrors('projectId')} ? 'is-invalid'">
                        <option value="">Выберите проект</option>
                        <option th:each="membership : ${activeMemberships}"
                                th:value="${membership.project.id}"
                                th:text="${membership.project.name}">Пример проекта</option>
                    </select>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('projectId')}"
                         th:errors="*{projectId}"></div>
                </div>

                <th:block th:replace="~{fragments/payment-form-fields :: fields}"/>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Сохранить платёж</button>
                    <a th:if="${returnTo != null}" class="btn btn-outline-secondary" th:href="${returnTo}">Отмена</a>
                    <a th:unless="${returnTo != null}" class="btn btn-outline-secondary"
                       th:href="@{/participants/{id}(id=${participantId})}">Отмена</a>
                </div>
            </form>
        </div>
    </div>

    <th:block th:replace="~{fragments/payment-form-fields :: exchangeRateScript}"/>
</div>
</body>
</html>
