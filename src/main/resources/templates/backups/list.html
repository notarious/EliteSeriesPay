<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::content})}">
<head>
    <title>Резервные копии &mdash; Проекты от Ave Elite</title>
</head>
<body>
<div th:fragment="content">
    <div class="page-header d-flex justify-content-between align-items-center">
        <h1 class="h3 mb-0">Резервные копии</h1>
        <form method="post" th:action="@{/backups}">
            <button class="btn btn-primary btn-sm" type="submit">Создать копию</button>
        </form>
    </div>

    <div class="alert alert-success flash-message py-2" th:if="${successMessage}" th:text="${successMessage}">
    </div>

    <div class="alert alert-danger flash-message py-2" th:if="${errorMessage}" th:text="${errorMessage}">
    </div>

    <p class="text-muted small mb-3">
        Для восстановления остановите приложение и замените файл
        <span th:text="${databaseFileName}"></span>
        нужной резервной копией.
    </p>

    <div th:if="${#lists.isEmpty(backups)}" class="empty-state" role="status">
        <i class="bi bi-hdd-stack empty-state-icon" aria-hidden="true"></i>
        <p>Резервных копий пока нет.</p>
    </div>

    <div th:unless="${#lists.isEmpty(backups)}" class="table-responsive app-table">
        <table class="table table-hover align-middle mb-0">
            <thead>
            <tr>
                <th scope="col">Имя файла</th>
                <th scope="col">Дата и время</th>
                <th scope="col" class="text-end">Размер</th>
                <th scope="col" class="text-end">Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="backup : ${backups}">
                <td th:text="${backup.fileName}"></td>
                <td th:text="${backup.createdAtFormatted}"></td>
                <td class="text-end" th:text="${backup.sizeFormatted}"></td>
                <td class="text-end">
                    <a class="btn btn-sm btn-outline-primary"
                       th:href="@{/backups/{fileName}/download(fileName=${backup.fileName})}"
                       data-bs-toggle="tooltip" data-bs-title="Скачать"
                       aria-label="Скачать">
                        <i class="bi bi-download" aria-hidden="true"></i>
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
