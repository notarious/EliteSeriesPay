<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::content})}">
<head>
    <title th:text="'Отчёты — ' + ${project.name} + ' — Проекты от Ave Elite'"></title>
</head>
<body>
<div th:fragment="content">
    <div class="page-header d-flex justify-content-between align-items-start">
        <div>
            <h1 class="h3 mb-1">Отчёты</h1>
            <p class="page-subtitle">
                Проект:
                <a th:href="@{/projects/{id}(id=${project.id})}" th:text="${project.name}"></a>
            </p>
        </div>
        <a class="btn btn-outline-secondary btn-sm" th:href="@{/projects/{id}(id=${project.id})}">К проекту</a>
    </div>

    <form class="filter-panel row g-2 align-items-end" method="get"
          th:action="@{/projects/{projectId}/reports(projectId=${project.id})}">
        <div class="col-auto">
            <label class="form-label small mb-1" for="month">Месяц</label>
            <select class="form-select form-select-sm" id="month" name="month" required>
                <option th:each="m : ${#numbers.sequence(1, 12)}"
                        th:value="${m}"
                        th:selected="${m == selectedMonth}"
                        th:text="${#temporals.format(T(java.time.YearMonth).of(selectedYear, m).atDay(1), 'LLLL')}">
                </option>
            </select>
        </div>
        <div class="col-auto">
            <label class="form-label small mb-1" for="year">Год</label>
            <input class="form-control form-control-sm" id="year" name="year" type="number"
                   min="2000" max="2100" required th:value="${selectedYear}">
        </div>
        <div class="col-auto">
            <button class="btn btn-primary btn-sm" type="submit">Показать</button>
        </div>
    </form>

    <h2 class="section-title" th:text="${report.monthLabel}"></h2>

    <div th:if="${!report.hasPayments()}" class="empty-state" role="status">
        <i class="bi bi-bar-chart empty-state-icon" aria-hidden="true"></i>
        <p>За выбранный месяц поступлений нет.</p>
    </div>

    <div th:if="${report.hasPayments()}">
        <div class="row g-3 mb-4">
            <div class="col-sm-6 col-lg-3">
                <div class="card summary-card h-100">
                    <div class="card-body py-2 px-3">
                        <div class="text-muted small">Получено</div>
                        <div class="fw-semibold" th:text="${report.totalGrossRubFormatted}"></div>
                    </div>
                </div>
            </div>
            <div class="col-sm-6 col-lg-3">
                <div class="card summary-card h-100">
                    <div class="card-body py-2 px-3">
                        <div class="text-muted small">Чистыми</div>
                        <div class="fw-semibold" th:text="${report.totalNetRubFormatted}"></div>
                    </div>
                </div>
            </div>
            <div class="col-sm-6 col-lg-3">
                <div class="card summary-card h-100">
                    <div class="card-body py-2 px-3">
                        <div class="text-muted small">Серий оплачено</div>
                        <div class="fw-semibold" th:text="${report.episodeFunding.episodesFunded()}"></div>
                    </div>
                </div>
            </div>
            <div class="col-sm-6 col-lg-3">
                <div class="card summary-card h-100">
                    <div class="card-body py-2 px-3">
                        <div class="text-muted small">Остаток</div>
                        <div class="fw-semibold" th:text="${report.remainingRubFormatted}"></div>
                    </div>
                </div>
            </div>
        </div>

        <h3 class="section-title">По источникам</h3>
        <div class="table-responsive app-table mb-4">
            <table class="table table-hover align-middle mb-0">
                <thead>
                <tr>
                    <th scope="col">Источник</th>
                    <th scope="col" class="text-end">Платежей</th>
                    <th scope="col" class="text-end">Сумма</th>
                    <th scope="col" class="text-end">Чистыми</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="row : ${report.sourceBreakdown}">
                    <td th:text="${row.sourceLabel}"></td>
                    <td class="text-end" th:text="${row.paymentCount}"></td>
                    <td class="text-end" th:text="${row.grossAmountRub}"></td>
                    <td class="text-end" th:text="${row.netAmountRub}"></td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${!#lists.isEmpty(report.participantContributions)}">
            <h3 class="section-title">Вклад участников</h3>
            <div class="table-responsive app-table">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                    <tr>
                        <th scope="col">Участник</th>
                        <th scope="col">Тип участия</th>
                        <th scope="col" class="text-end">Чистыми</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="row : ${report.participantContributions}">
                        <td th:text="${row.participantName}"></td>
                        <td th:text="${row.billingModeLabel}"></td>
                        <td class="text-end" th:text="${row.netContributionRub}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
