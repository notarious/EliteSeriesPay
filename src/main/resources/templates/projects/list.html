<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::content})}">
<head>
    <title>Проекты &mdash; EliteSeriesPay</title>
</head>
<body>
<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-0">Проекты</h1>
        <a class="btn btn-primary" th:href="@{/projects/new}">Новый проект</a>
    </div>

    <div th:if="${#lists.isEmpty(projects)}" class="alert alert-info mb-0">
        Проектов пока нет. Создайте первый, чтобы начать.
    </div>

    <div th:unless="${#lists.isEmpty(projects)}" class="table-responsive">
        <table class="table table-striped align-middle">
            <thead>
            <tr>
                <th scope="col">Название</th>
                <th scope="col" class="text-end">Стоимость эпизода (₽)</th>
                <th scope="col" class="text-end">Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="project : ${projects}">
                <td>
                    <a th:href="@{/projects/{id}(id=${project.id})}" th:text="${project.name}">Пример проекта</a>
                </td>
                <td class="text-end"
                    th:text="${#numbers.formatDecimal(project.episodeCostRub, 1, 'COMMA', 2, 'POINT')} + ' ₽'">
                    1,000.00 ₽
                </td>
                <td class="text-end">
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/projects/{id}(id=${project.id})}">Открыть</a>
                    <a class="btn btn-sm btn-outline-secondary" th:href="@{/projects/{id}/edit(id=${project.id})}">Изменить</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
