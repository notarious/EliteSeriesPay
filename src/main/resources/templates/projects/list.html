<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::content})}">
<head>
    <title>Проекты &mdash; Проекты от Ave Elite</title>
</head>
<body>
<div th:fragment="content">
    <div class="page-header d-flex justify-content-between align-items-center">
        <h1 class="h3 mb-0">Проекты</h1>
        <a class="btn btn-primary btn-sm" th:href="@{/projects/new}">Новый проект</a>
    </div>

    <div th:if="${#lists.isEmpty(projects)}" class="empty-state" role="status">
        <i class="bi bi-collection empty-state-icon" aria-hidden="true"></i>
        <p>Проектов пока нет. Создайте первый, чтобы начать.</p>
    </div>

    <div th:unless="${#lists.isEmpty(projects)}" class="table-responsive app-table">
        <table class="table table-hover align-middle mb-0">
            <thead>
            <tr>
                <th scope="col">Название</th>
                <th scope="col" class="text-end">Стоимость эпизода (₽)</th>
                <th scope="col" class="text-end">Абонемент</th>
                <th scope="col" class="text-end">Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="project : ${projects}">
                <td>
                    <a th:href="@{/projects/{id}(id=${project.id})}" th:text="${project.name}">Пример проекта</a>
                </td>
                <td class="text-end"
                    th:text="${#numbers.formatDecimal(project.episodeCostRub, 1, 'COMMA', 2, 'POINT')} + ' ₽'">
                    1,000.00 ₽
                </td>
                <td class="text-end">
                    <span th:text="${#numbers.formatDecimal(project.monthlyFeeRub, 1, 'COMMA', 2, 'POINT')} + ' ₽'">500.00 ₽</span>
                    /
                    <span th:text="${#numbers.formatDecimal(project.monthlyFeeEur, 1, 'COMMA', 2, 'POINT')} + ' €'">5.00 €</span>
                </td>
                <td class="text-end">
                    <div class="d-inline-flex gap-1">
                        <a class="btn btn-sm btn-outline-secondary"
                           th:href="@{/projects/{id}(id=${project.id})}"
                           data-bs-toggle="tooltip" data-bs-title="Просмотр"
                           aria-label="Просмотр">
                            <i class="bi bi-eye" aria-hidden="true"></i>
                        </a>
                        <a class="btn btn-sm btn-outline-primary"
                           th:href="@{/projects/{id}/edit(id=${project.id})}"
                           data-bs-toggle="tooltip" data-bs-title="Изменить"
                           aria-label="Изменить">
                            <i class="bi bi-pencil" aria-hidden="true"></i>
                        </a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
