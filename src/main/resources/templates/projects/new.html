<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::content})}">
<head>
    <title>Новый проект &mdash; EliteSeriesPay</title>
</head>
<body>
<div th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <h1 class="mb-4">Новый проект</h1>

            <form th:action="@{/projects}" th:object="${projectForm}" method="post" novalidate>
                <div class="mb-3">
                    <label for="name" class="form-label">Название</label>
                    <input type="text" class="form-control" id="name" th:field="*{name}"
                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>

                <div class="mb-3">
                    <label for="episodeCostRub" class="form-label">Стоимость эпизода (₽)</label>
                    <input type="number" class="form-control" id="episodeCostRub" th:field="*{episodeCostRub}"
                           step="0.01" min="0.01"
                           th:classappend="${#fields.hasErrors('episodeCostRub')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('episodeCostRub')}"
                         th:errors="*{episodeCostRub}"></div>
                </div>

                <div class="mb-3">
                    <label for="monthlyFeeRub" class="form-label">Абонентская плата (₽)</label>
                    <input type="number" class="form-control" id="monthlyFeeRub" th:field="*{monthlyFeeRub}"
                           step="0.01" min="0.01"
                           th:classappend="${#fields.hasErrors('monthlyFeeRub')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('monthlyFeeRub')}"
                         th:errors="*{monthlyFeeRub}"></div>
                </div>

                <div class="mb-4">
                    <label for="monthlyFeeEur" class="form-label">Абонентская плата (€)</label>
                    <input type="number" class="form-control" id="monthlyFeeEur" th:field="*{monthlyFeeEur}"
                           step="0.01" min="0.01"
                           th:classappend="${#fields.hasErrors('monthlyFeeEur')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('monthlyFeeEur')}"
                         th:errors="*{monthlyFeeEur}"></div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Создать проект</button>
                    <a class="btn btn-outline-secondary" th:href="@{/projects}">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
