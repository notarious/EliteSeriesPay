<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::content})}">
<head>
    <title th:text="${project.name} + ' — EliteSeriesPay'">Проект — EliteSeriesPay</title>
</head>
<body>
<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-start mb-4">
        <div>
            <h1 class="mb-1" th:text="${project.name}">Пример проекта</h1>
            <p class="text-muted mb-0">
                Стоимость эпизода:
                <span th:text="${#numbers.formatDecimal(project.episodeCostRub, 1, 'COMMA', 2, 'POINT')} + ' ₽'">
                    1,000.00 ₽
                </span>
                · Абонемент:
                <span th:text="${#numbers.formatDecimal(project.monthlyFeeRub, 1, 'COMMA', 2, 'POINT')} + ' ₽'">
                    500.00 ₽
                </span>
                /
                <span th:text="${#numbers.formatDecimal(project.monthlyFeeEur, 1, 'COMMA', 2, 'POINT')} + ' €'">
                    5.00 €
                </span>
            </p>
        </div>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-secondary" th:href="@{/projects}">К списку</a>
            <a class="btn btn-outline-primary" th:href="@{/projects/{id}/edit(id=${project.id})}">Изменить проект</a>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="h4 mb-0">Участники</h2>
        <a class="btn btn-primary btn-sm"
           th:href="@{/projects/{projectId}/participants/new(projectId=${project.id})}">Добавить участника</a>
    </div>

    <form class="row g-3 align-items-end mb-3" method="get" th:action="@{/projects/{id}(id=${project.id})}">
        <div class="col-md-3">
            <label for="billingMode" class="form-label">Тип оплаты</label>
            <select class="form-select form-select-sm" id="billingMode" name="billingMode">
                <option value="" th:selected="${selectedBillingMode == null}">Все</option>
                <option th:each="mode : ${billingModes}"
                        th:value="${mode.name()}"
                        th:selected="${selectedBillingMode == mode}"
                        th:text="${mode.displayName}">Абонемент</option>
            </select>
        </div>
        <div class="col-md-3">
            <label for="paymentStatus" class="form-label">Статус оплаты</label>
            <select class="form-select form-select-sm" id="paymentStatus" name="paymentStatus">
                <option value="" th:selected="${selectedPaymentStatus == null}">Все</option>
                <option th:each="filter : ${paymentStatusFilters}"
                        th:if="${filter.name() != 'ALL'}"
                        th:value="${filter.name()}"
                        th:selected="${selectedPaymentStatus == filter}"
                        th:text="${filter.displayName}">
                    Активные
                </option>
            </select>
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-sm btn-outline-primary w-100">Применить</button>
        </div>
    </form>

    <div th:if="${#lists.isEmpty(participants)}" class="alert alert-info mb-0">
        Нет участников по выбранным фильтрам.
    </div>

    <div th:unless="${#lists.isEmpty(participants)}" class="table-responsive">
        <table class="table table-sm table-striped align-middle">
            <thead>
            <tr>
                <th scope="col">Имя</th>
                <th scope="col">Тип оплаты</th>
                <th scope="col">Оплачен до</th>
                <th scope="col">Статус оплаты</th>
                <th scope="col">Аванс</th>
                <th scope="col" class="text-end">Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="row : ${participants}">
                <td>
                    <a th:href="@{/participants/{id}(id=${row.participant.id})}"
                       th:text="${row.participant.name}">Иван</a>
                </td>
                <td th:text="${row.billingModeLabel}">Абонемент</td>
                <td>
                    <span th:if="${row.paidUntilMonth != null}"
                          th:text="${#temporals.format(row.paidUntilMonth.atDay(1), 'MM.yyyy')}">06.2026</span>
                </td>
                <td>
                    <span th:classappend="${row.statusCssClass}"
                          th:text="${row.paymentStatusLabel}">Активен</span>
                </td>
                <td>
                    <span th:if="${row.partialPaymentInfo != null}"
                          th:with="partial=${row.partialPaymentInfo}">
                        <span th:text="${#numbers.formatDecimal(partial.advanceAmount, 1, 'COMMA', 2, 'POINT')} + ' ' + ${partial.advanceCurrency}">50.00 RUB</span>
                        <span class="text-muted">· До продления:</span>
                        <span th:text="${#numbers.formatDecimal(partial.remainingUntilRenewal, 1, 'COMMA', 2, 'POINT')} + ' ' + ${partial.advanceCurrency}">50.00 RUB</span>
                    </span>
                </td>
                <td class="text-end">
                    <div class="d-inline-flex gap-1">
                        <a class="btn btn-sm btn-outline-secondary"
                           th:href="@{/participants/{id}(id=${row.participant.id})}"
                           data-bs-toggle="tooltip" data-bs-title="Просмотр"
                           aria-label="Просмотр">
                            <i class="bi bi-eye" aria-hidden="true"></i>
                        </a>
                        <a class="btn btn-sm btn-outline-primary"
                           th:href="@{/projects/{projectId}/participants/{participantId}/edit(projectId=${project.id}, participantId=${row.participant.id})}"
                           data-bs-toggle="tooltip" data-bs-title="Изменить"
                           aria-label="Изменить">
                            <i class="bi bi-pencil" aria-hidden="true"></i>
                        </a>
                        <a class="btn btn-sm btn-outline-success"
                           th:href="@{/participants/{participantId}/payments/new(participantId=${row.participant.id}, projectId=${project.id})}"
                           data-bs-toggle="tooltip" data-bs-title="Оплата"
                           aria-label="Оплата">
                            <i class="bi bi-cash-coin" aria-hidden="true"></i>
                        </a>
                        <form th:action="@{/projects/{projectId}/participants/{participantId}/remove(projectId=${project.id}, participantId=${row.participant.id})}"
                              method="post" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-outline-danger"
                                    data-bs-toggle="tooltip" data-bs-title="Исключить из проекта"
                                    aria-label="Исключить из проекта"
                                    onclick="return confirm('Исключить участника из проекта?');">
                                <i class="bi bi-person-dash" aria-hidden="true"></i>
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
