<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::content})}">
<head>
    <title th:text="${project.name} + ' — Проекты от Ave Elite'"></title>
</head>
<body>
<div th:fragment="content">
    <div class="page-header d-flex justify-content-between align-items-start">
        <div>
            <h1 class="h3 mb-1" th:text="${project.name}"></h1>
            <p class="page-subtitle">
                Стоимость эпизода:
                <span th:text="${#numbers.formatDecimal(project.episodeCostRub, 1, 'COMMA', 2, 'POINT')} + ' ₽'">
                </span>
                · Абонемент:
                <span th:text="${#numbers.formatDecimal(project.monthlyFeeRub, 1, 'COMMA', 2, 'POINT')} + ' ₽'">
                </span>
                /
                <span th:text="${#numbers.formatDecimal(project.monthlyFeeEur, 1, 'COMMA', 2, 'POINT')} + ' €'">
                </span>
            </p>
        </div>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-secondary btn-sm" th:href="@{/projects}">К списку</a>
            <a class="btn btn-outline-primary btn-sm" th:href="@{/projects/{id}/edit(id=${project.id})}">Изменить</a>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="section-title mb-0">Участники</h2>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-secondary btn-sm"
               th:href="@{/projects/{projectId}/reports(projectId=${project.id})}">Отчёты</a>
            <a class="btn btn-outline-secondary btn-sm"
               th:href="@{/projects/{projectId}/payments(projectId=${project.id})}">Платежи</a>
            <a class="btn btn-primary btn-sm"
               th:href="@{/projects/{projectId}/participants/new(projectId=${project.id})}">Добавить участника</a>
        </div>
    </div>

    <form class="filter-panel row g-2 align-items-end" method="get" th:action="@{/projects/{id}(id=${project.id})}">
        <div class="col-md-3 col-lg-2">
            <label for="billingMode" class="form-label small mb-1">Тип оплаты</label>
            <select class="form-select form-select-sm" id="billingMode" name="billingMode">
                <option value="" th:selected="${selectedBillingMode == null}">Все</option>
                <option th:each="mode : ${billingModes}"
                        th:value="${mode.name()}"
                        th:selected="${selectedBillingMode == mode}"
                        th:text="${mode.displayName}"></option>
            </select>
        </div>
        <div class="col-md-3 col-lg-2">
            <label for="paymentStatus" class="form-label small mb-1">Статус оплаты</label>
            <select class="form-select form-select-sm" id="paymentStatus" name="paymentStatus">
                <option value="" th:selected="${selectedPaymentStatus == null}">Все</option>
                <option th:each="filter : ${paymentStatusFilters}"
                        th:if="${filter.name() != 'ALL'}"
                        th:value="${filter.name()}"
                        th:selected="${selectedPaymentStatus == filter}"
                        th:text="${filter.displayName}">
                </option>
            </select>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-sm btn-outline-primary">Применить</button>
        </div>
    </form>

    <div th:if="${#lists.isEmpty(participants)}" class="empty-state" role="status">
        <i class="bi bi-people empty-state-icon" aria-hidden="true"></i>
        <p>Нет участников по выбранным фильтрам.</p>
    </div>

    <div th:unless="${#lists.isEmpty(participants)}" class="table-responsive app-table">
        <table class="table table-hover align-middle mb-0">
            <thead>
            <tr>
                <th scope="col">Имя</th>
                <th scope="col">Тип оплаты</th>
                <th scope="col">Оплачен до</th>
                <th scope="col" th:text="${currentMonthPaymentColumnTitle}"></th>
                <th scope="col">Статус оплаты</th>
                <th scope="col">Аванс</th>
                <th scope="col" class="text-end">Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="row : ${participants}">
                <td>
                    <a th:href="@{/participants/{id}(id=${row.participant.id})}"
                       th:text="${row.participant.name}"></a>
                </td>
                <th:block th:replace="~{fragments/membership-billing-cells :: cells(
                    row=${row},
                    paymentUrl=@{/participants/{participantId}/payments/new(participantId=${row.participant.id}, projectId=${project.id}, returnTo=${participantsNavigation.listUrl()})},
                    removeUrl=@{/projects/{projectId}/participants/{participantId}/remove(projectId=${project.id}, participantId=${row.participant.id})},
                    filterFormParams=${participantsNavigation.formParams()},
                    extraActions=~{::project-participant-actions(row=${row})}
                )}"/>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="card summary-card mt-4">
        <div class="card-body">
            <h2 class="section-title mb-2" th:text="${monthlySummary.monthLabel}"></h2>
            <p th:if="${!monthlySummary.hasPayments()}" class="text-muted small mb-0">
                За текущий месяц поступлений нет.
            </p>
            <div th:if="${monthlySummary.hasPayments()}" class="small text-muted mb-0">
                <p class="mb-1">
                    Получено чистыми:
                    <span th:text="${monthlySummary.totalNetRubFormatted}"></span>
                </p>
                <p class="mb-1">
                    Стоимость серии:
                    <span th:text="${monthlySummary.episodeCostRubFormatted}"></span>
                </p>
                <p class="mb-1" th:text="${monthlySummary.episodesFundedLine}"></p>
                <p class="mb-1" th:if="${monthlySummary.remainingLine != null}"
                   th:text="${monthlySummary.remainingLine}"></p>
                <p class="mb-0" th:text="${monthlySummary.amountToNextEpisodeLine}">
                </p>
            </div>
        </div>
    </div>
</div>

<th:block th:fragment="project-participant-actions(row)">
    <a class="btn btn-sm btn-outline-secondary"
       th:href="@{/participants/{id}(id=${row.participant.id})}"
       data-bs-toggle="tooltip" data-bs-title="Просмотр"
       aria-label="Просмотр">
        <i class="bi bi-eye" aria-hidden="true"></i>
    </a>
    <a class="btn btn-sm btn-outline-primary"
       th:href="@{/projects/{projectId}/participants/{participantId}/edit(projectId=${project.id}, participantId=${row.participant.id})}"
       data-bs-toggle="tooltip" data-bs-title="Изменить"
       aria-label="Изменить">
        <i class="bi bi-pencil" aria-hidden="true"></i>
    </a>
</th:block>
</body>
</html>
