spring:
  application:
    name: EliteSeriesPay

  datasource:
    url: jdbc:sqlite:file:./eliteseriespay.db?busy_timeout=5000
    driver-class-name: org.sqlite.JDBC

  jpa:
    open-in-view: false
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true

  thymeleaf:
    cache: false

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

logging:
  level:
    root: INFO

eliteseriespay:
  exchange-rate:
    api-url: https://api.frankfurter.app/latest
    connect-timeout: 5s
    read-timeout: 5s
    com.eliteseriespay: DEBUG
